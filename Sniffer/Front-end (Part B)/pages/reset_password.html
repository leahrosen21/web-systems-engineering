<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sniffer || Reset Password</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/auth.css" />
</head>
<body>

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar" role="navigation" aria-label="Main navigation">
    <div class="container">
      <a href="login.html" class="navbar-brand" aria-label="Sniffer home">
        <span class="brand-paw" aria-hidden="true"><img src="../images/heart-paw-yellow.png" alt="Sniffer paw icon" class="brand-logo"/></span>
        Sniffer
      </a>
    </div>
  </nav>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="page-content auth-page" id="main-content">
    <div class="auth-wrapper animate-in">

      <div class="auth-card card">
        <div class="card-body">

          <!-- Header -->
          <div class="auth-header">
            <h1>Reset Password</h1>
            <p>This feature is still in progress, please check back soon!</p>
          </div>

          <div class="alert alert-success" role="status">
            Thanks for stopping by! We're working hard to get this ready for you.
          </div>

          <div>
            <p class="auth-switch">
              Remember your password?
              <a href="login.html">Log in here</a>
            </p>
          </div>

        </div>
      </div>

    </div>
  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="footer">
    <div class="container">
      <span class="footer-brand">Sniffer</span>
      <p class="footer-copy">&copy; 2026 Sniffer. All rights reserved.</p>
    </div>
  </footer>

  <script src="../js/nav.js"></script>
</body>
</html>
