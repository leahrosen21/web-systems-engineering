<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sniffer || Reset Password</title>
  <link rel="icon" type="image/png" href="../images/heart-paw-for-tab.png" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/auth.css" />
</head>
<body>

  <nav class="navbar" role="navigation" aria-label="Main navigation">
    <div class="container">
      <a href="/login" class="navbar-brand" aria-label="Sniffer home">
        <span class="brand-paw" aria-hidden="true"><img src="../images/heart-paw-yellow.png" alt="Sniffer paw icon" class="brand-logo"/></span>
        Sniffer
      </a>
    </div>
  </nav>

  <main class="page-content auth-page" id="main-content">
    <div class="auth-wrapper animate-in">
      <div class="auth-card card">
        <div class="card-body">

          <div class="auth-header">
            <h1>Reset Password</h1>
            <p>Enter your email and choose a new password.</p>
          </div>

          <div class="alert alert-error" id="reset-error" role="alert" hidden></div>

          <form id="reset-form" action="/reset-password" method="post" novalidate aria-label="Reset password form">

            <div class="form-group">
              <label class="form-label" for="email">
                Email Address <span class="required-star" aria-hidden="true">*</span>
              </label>
              <input class="form-control" type="email" id="email" name="email"
                placeholder="your@email.com" required autocomplete="email" />
              <span class="error-message" role="alert"></span>
            </div>

            <div class="form-group">
              <label class="form-label" for="password">
                New Password <span class="required-star" aria-hidden="true">*</span>
              </label>
              <div class="password-field">
                <input class="form-control" type="password" id="password" name="password"
                  placeholder="Min. 6 characters" required autocomplete="new-password" />
                <button type="button" class="toggle-password" id="toggle-password" aria-label="Show password">Show</button>
              </div>
              <span class="error-message" role="alert"></span>
            </div>

            <div class="form-group">
              <label class="form-label" for="confirm-password">
                Confirm New Password <span class="required-star" aria-hidden="true">*</span>
              </label>
              <input class="form-control" type="password" id="confirm-password"
                name="confirm-password" placeholder="Repeat new password"
                required autocomplete="new-password" />
              <span class="error-message" role="alert"></span>
            </div>

            <button type="submit" class="btn btn-primary btn-block btn-lg">
              Reset Password
            </button>

          </form>

          <p class="auth-switch">
            Remember your password?
            <a href="/login">Log in here</a>
          </p>

        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <span class="footer-brand">Sniffer</span>
      <p class="footer-copy">&copy; 2026 Sniffer. All rights reserved.</p>
    </div>
  </footer>

  <script src="../js/data.js"></script>
  <script src="../js/validation.js"></script>
  <script src="../js/nav.js"></script>
  <script src="../js/reset_password.js"></script>
</body>
</html>
